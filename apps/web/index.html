<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NoteFlow</title>
    <link rel="stylesheet" href="./styles.css?v=sidebar-1" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">N</span>
          <span class="brand-name">NoteFlow</span>
        </div>

        <nav class="side-nav" aria-label="Modules">
          <button type="button" data-nav="agent">
            <span class="nav-icon">✦</span> AI Agent
          </button>
          <button type="button" data-nav="flashcards">
            <span class="nav-icon">▣</span> Flashcards
          </button>
          <button type="button" data-nav="quiz">
            <span class="nav-icon">?</span> Quiz
          </button>
          <button type="button" data-nav="general">
            <span class="nav-icon">☰</span> General
          </button>
        </nav>

        <div class="side-section">
          <div class="side-label">
            Documents
            <button id="sidebar-refresh" class="icon-button" type="button" title="Refresh documents">↻</button>
          </div>
          <div id="sidebar-documents" class="side-documents">
            <div class="side-empty">Loading…</div>
          </div>
        </div>

        <div class="side-footer">
          <div id="sidebar-tasks" class="side-tasks"></div>
        </div>
      </aside>

      <main class="content">
        <div id="view-root" class="view-root"></div>
      </main>
    </div>

    <script src="./app.js?v=sidebar-1"></script>
  </body>
</html>
