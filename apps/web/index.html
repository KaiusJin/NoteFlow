<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NoteFlow</title>
    <link rel="stylesheet" href="./vendor/katex/katex.min.css" />
    <script defer src="./vendor/katex/katex.min.js"></script>
    <link rel="stylesheet" href="./styles.css?v=editor-11" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">N</span>
          <span class="brand-name">NoteFlow</span>
        </div>

        <nav class="side-nav" aria-label="Modules">
          <button type="button" data-nav="agent">
            <span class="nav-icon">✦</span> AI Agent
          </button>
          <button type="button" data-nav="editor">
            <span class="nav-icon">✎</span> Editor
          </button>
          <button type="button" data-nav="folders">
            <span class="nav-icon">▣</span> Folders
          </button>
          <button type="button" data-nav="flashcards">
            <span class="nav-icon">▣</span> Flashcards
          </button>
          <button type="button" data-nav="quiz">
            <span class="nav-icon">?</span> Quiz
          </button>
          <button type="button" data-nav="general">
            <span class="nav-icon">☰</span> General
          </button>
          <button type="button" data-nav="settings">
            <span class="nav-icon">⚙</span> Settings
          </button>
        </nav>

        <div class="side-footer">
          <div id="sidebar-tasks" class="side-tasks"></div>
        </div>
      </aside>

      <main class="content">
        <div id="view-root" class="view-root"></div>
      </main>
    </div>

    <script src="./app.js?v=editor-11"></script>
  </body>
</html>
